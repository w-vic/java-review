server:
  port: 8082

spring:
  application:
    name: java-review-order

  # Nacos 配置中心导入
  config:
    import: optional:nacos:${spring.application.name}.yml

  # ==================== MySQL ====================
  datasource:
    url: jdbc:mysql://localhost:3306/java_review?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==================== Redis ====================
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

  # ==================== Nacos ====================
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yml

# ==================== MyBatis-Plus ====================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== Actuator / Prometheus ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
