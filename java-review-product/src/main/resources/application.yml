server:
  port: 8081

spring:
  application:
    name: java-review-product

  # Nacos 配置中心导入（optional: 表示 Nacos 不可用时不阻塞启动）
  config:
    import: optional:nacos:${spring.application.name}.yml

  # ==================== MySQL 数据源 ====================
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:java_review}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:12345678}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==================== Redis ====================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:3000ms}

  # ==================== Elasticsearch ====================
  # 注意：spring.elasticsearch.uris 不在 spring.data 下
  elasticsearch:
    uris: http://${ELASTICSEARCH_HOST:localhost}:${ELASTICSEARCH_PORT:9200}

  # ==================== Nacos ====================
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yml

# ==================== MyBatis-Plus ====================
mybatis-plus:
  configuration:
    # 开启下划线转驼峰（数据库 create_time → Java createTime）
    map-underscore-to-camel-case: true
    # 开发阶段打印 SQL，方便调试
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 逻辑删除字段值配置
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== Actuator / Prometheus ====================
management:
  endpoints:
    web:
      exposure:
        # 暴露 health、info、prometheus 端点供监控采集
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
