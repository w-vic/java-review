## Prometheus 配置文件
## 定义要抓取指标的目标（Spring Boot Actuator 暴露的 /actuator/prometheus 端点）

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'java-review-product'
    metrics_path: '/actuator/prometheus'
    static_configs:
      # host.docker.internal 用于容器内访问宿主机上运行的 Spring Boot 应用
      - targets: ['host.docker.internal:8081']

  - job_name: 'java-review-order'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']

  - job_name: 'java-review-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
