# Nacos 作为服务注册中心 + 配置中心：
# - standalone 模式 + 内嵌 Derby 存储，与 Docker Compose 保持一致
# - 后续如需 MySQL 持久化，需单独建 nacos 数据库并导入 Nacos schema
apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: java-review
spec:
  ports:
    # 控制台与 HTTP API
    - name: http
      port: 8848
      targetPort: 8848
    # gRPC 通信端口（Nacos 2.x）
    - name: grpc
      port: 9848
      targetPort: 9848
  selector:
    app: nacos
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
  namespace: java-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      containers:
        - name: nacos
          image: nacos/nacos-server:v2.3.2-slim
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8848
            - containerPort: 9848
          env:
            - name: MODE
              value: standalone
            - name: NACOS_AUTH_ENABLE
              value: "false"
            - name: JVM_XMS
              value: 256m
            - name: JVM_XMX
              value: 256m
          readinessProbe:
            httpGet:
              # /nacos 可作为就绪探针入口
              path: /nacos
              port: 8848
            initialDelaySeconds: 25
            periodSeconds: 10
