# MySQL 由三部分组成：
# 1) init.sql ConfigMap：首次启动自动建库建表和灌入测试数据
# 2) Service：给集群内应用提供稳定访问名 mysql:3306
# 3) StatefulSet + PVC：保证数据库实例与数据盘稳定持久
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-initdb
  namespace: java-review
data:
  init.sql: |
    SET NAMES utf8mb4;
    CREATE DATABASE IF NOT EXISTS java_review
      DEFAULT CHARACTER SET utf8mb4
      DEFAULT COLLATE utf8mb4_unicode_ci;
    USE java_review;
    DROP TABLE IF EXISTS product;
    DROP TABLE IF EXISTS orders;
    CREATE TABLE IF NOT EXISTS product (
      id BIGINT AUTO_INCREMENT PRIMARY KEY,
      name VARCHAR(200) NOT NULL,
      description VARCHAR(1000) DEFAULT '',
      price DECIMAL(10, 2) NOT NULL,
      stock INT NOT NULL DEFAULT 0,
      create_time DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
      update_time DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      deleted TINYINT NOT NULL DEFAULT 0,
      INDEX idx_name (name)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
    CREATE TABLE IF NOT EXISTS orders (
      id BIGINT AUTO_INCREMENT PRIMARY KEY,
      order_no VARCHAR(64) NOT NULL,
      product_id BIGINT NOT NULL,
      product_name VARCHAR(200) NOT NULL,
      price DECIMAL(10, 2) NOT NULL,
      quantity INT NOT NULL,
      total_amount DECIMAL(10, 2) NOT NULL,
      status TINYINT NOT NULL DEFAULT 0,
      create_time DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
      update_time DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      deleted TINYINT NOT NULL DEFAULT 0,
      UNIQUE INDEX uk_order_no (order_no),
      INDEX idx_product_id (product_id)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
    INSERT INTO product (name, description, price, stock) VALUES
      ('Java 编程思想', '经典 Java 书籍，深入理解面向对象', 108.00, 100),
      ('Spring Boot 实战', 'Spring Boot 从入门到精通', 79.00, 200),
      ('深入理解 JVM 虚拟机', '周志明著，JVM 必读', 99.00, 150);
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: java-review
spec:
  # ClusterIP 默认即可，供集群内访问
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
  selector:
    app: mysql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: java-review
spec:
  # StatefulSet 依赖 headless/普通 serviceName 维持稳定网络标识
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0.30
          ports:
            - containerPort: 3306
          env:
            # root 密码来自 Secret，避免写死在清单里
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: java-review-secret
                  key: MYSQL_PASSWORD
          volumeMounts:
            # MySQL 数据目录挂载到 PVC
            - name: mysql-data
              mountPath: /var/lib/mysql
            # 挂载初始化 SQL，容器首次启动时自动执行
            - name: mysql-initdb
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              # 用 mysqladmin ping 判断实例可接收连接
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD"]
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: mysql-initdb
          configMap:
            name: mysql-initdb
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            # 学习环境给 5Gi，按需调整
            storage: 5Gi
