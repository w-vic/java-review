# base 层：定义“与环境无关”的基础资源清单
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # 基础配置
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  # 中间件（MySQL/Redis 当前在宿主机，不在集群内部署；文件保留供后续分布式学习）
  - elasticsearch.yaml
  - nacos.yaml
  # 应用
  - product.yaml
  - order.yaml
  - gateway.yaml
  # 流量与高可用
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
