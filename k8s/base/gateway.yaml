# 网关服务：
# - 对外统一入口
# - 通过 Nacos 发现 order/product 实例并转发
apiVersion: v1
kind: Service
metadata:
  name: java-review-gateway
  namespace: java-review
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: java-review-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-review-gateway
  namespace: java-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-review-gateway
  template:
    metadata:
      labels:
        app: java-review-gateway
    spec:
      containers:
        - name: java-review-gateway
          image: java-review-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            # 网关仅需 Nacos 地址等公共配置
            - configMapRef:
                name: java-review-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 768Mi
